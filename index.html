<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Lucky</title>
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
            
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
        }

        .image-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            margin-bottom: 30px;
            container-type: inline-size; 
        }

        .image-container img {
            display: block;
            width: 100%;
            height: auto;
        }

        #number-display {
            position: absolute;
            top: 50%;
            left: 54%; 
            transform: translate(-50%, -50%);
            font-size: 11.7vw; 
            font-size: 13cqw; 
            
            font-weight: bold;
            color: black;
            text-align: center;
            z-index: 10;
            white-space: nowrap; 
        }

        @media (min-width: 1111px) {
            #number-display {
                font-size: 130px; 
            }
        }

        #circle-effect {
            position: absolute;
            top: 50%;
            left: 54%;
            transform: translate(-50%, -50%);
            border: 3px solid black;
            border-radius: 50%;
            background-color: transparent;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        .animating {
            animation: shrinkCircle 2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        @keyframes shrinkCircle {
            0% {
                width: 200vw;
                height: 200vw;
                opacity: 1;
            }
            100% {
                width: 0px;
                height: 0px;
                opacity: 0;
            }
        }

        #lucky-btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: #333333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }

        #lucky-btn:hover {
            background-color: #000000;
        }

        #lucky-btn:disabled {
            background-color: #999999;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="luckydraw_image.png" alt="배경 이미지">
        <div id="number-display"></div>
        <div id="circle-effect"></div>
    </div>

    <button id="lucky-btn">Get Lucky!</button>

    <script>
        const button = document.getElementById('lucky-btn');
        const numberDisplay = document.getElementById('number-display');
        const circle = document.getElementById('circle-effect');
        let isAnimating = false;

        button.addEventListener('click', () => {
            if (isAnimating) return;
            isAnimating = true;
            button.disabled = true;

            numberDisplay.textContent = '';

            circle.classList.remove('animating');
            void circle.offsetWidth; 
            circle.classList.add('animating');

            setTimeout(() => {
                // 1에서 70 사이의 랜덤 숫자 생성
                const randomNumber = Math.floor(Math.random() * 70) + 1;
                numberDisplay.textContent = randomNumber;
                
                isAnimating = false;
                button.disabled = false;
            }, 2000); 
        });
    </script>
</body>
</html>
