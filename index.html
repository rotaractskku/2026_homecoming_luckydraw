<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Lucky</title>
    <style>
        /* 기본 바탕을 하얗게 설정하고 요소들을 화면 중앙에 배치합니다. */
        body {
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden; /* 원 애니메이션 시 화면 밖으로 나가는 스크롤바 방지 */
        }

        /* 이미지와 숫자가 겹쳐질 컨테이너 영역입니다. */
        .image-container {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        /* 첨부하신 이미지를 표시합니다. */
        .image-container img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        /* 숫자가 표시될 공간의 위치와 스타일을 지정합니다. */
        #number-display {
            position: absolute;
            top: 50%;
            left: 48%; /* 동아리 로고와 '번' 사이의 중앙 위치 (필요시 조정 가능) */
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: bold;
            color: black;
            text-align: center;
            width: 80px;
            z-index: 10;
        }

        /* 크기가 줄어드는 원의 초기 스타일입니다. */
        #circle-effect {
            position: absolute;
            top: 50%;
            left: 54%; /* 숫자가 표시되는 위치와 동일하게 맞춥니다. */
            transform: translate(-50%, -50%);
            border: 3px solid black;
            border-radius: 50%;
            background-color: transparent;
            opacity: 0;
            pointer-events: none; /* 클릭 이벤트를 방해하지 않도록 설정 */
            z-index: 5;
        }

        /* 버튼 클릭 시 추가될 원의 애니메이션 클래스입니다. (정확히 2초 소요) */
        .animating {
            animation: shrinkCircle 2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        /* 원이 화면 바깥쪽 크기에서 중앙으로 줄어드는 애니메이션 키프레임 */
        @keyframes shrinkCircle {
            0% {
                width: 1500px;
                height: 1500px;
                opacity: 1;
            }
            100% {
                width: 0px;
                height: 0px;
                opacity: 0;
            }
        }

        /* Get Lucky! 버튼 스타일 */
        #lucky-btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: #333333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }

        #lucky-btn:hover {
            background-color: #000000;
        }

        #lucky-btn:disabled {
            background-color: #999999;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="luckydraw_image.png" alt="배경 이미지">
        
        <div id="number-display"></div>
        
        <div id="circle-effect"></div>
    </div>

    <button id="lucky-btn">Get Lucky!</button>

    <script>
        const button = document.getElementById('lucky-btn');
        const numberDisplay = document.getElementById('number-display');
        const circle = document.getElementById('circle-effect');
        let isAnimating = false;

        button.addEventListener('click', () => {
            // 애니메이션이 진행 중일 때는 중복 클릭을 방지합니다.
            if (isAnimating) return;
            isAnimating = true;
            button.disabled = true; // 시각적으로도 버튼 비활성화

            // 1. 기존 숫자를 공란으로 변경
            numberDisplay.textContent = '';

            // 2. 애니메이션 클래스를 제거했다가 다시 추가하여 애니메이션을 처음부터 재실행
            circle.classList.remove('animating');
            void circle.offsetWidth; // 브라우저가 변경 사항을 강제로 다시 계산하도록 유도 (Reflow)
            circle.classList.add('animating');

            // 3. 정확히 2초(2000ms) 후에 숫자 표시 로직 실행
            setTimeout(() => {
                // 1부터 50까지의 난수 생성
                const randomNumber = Math.floor(Math.random() * 50) + 1;
                numberDisplay.textContent = randomNumber;
                
                // 애니메이션 상태 종료 및 버튼 활성화
                isAnimating = false;
                button.disabled = false;
            }, 2000);
        });
    </script>
</body>
</html>
