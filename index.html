<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Lucky</title>
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }

        /* 수정된 부분 1: image-container
           이미지와 숫자가 같이 커지고 작아지도록 묶어주는 영역의 기준을 설정합니다.
           container-type을 지정하여 내부 텍스트가 이 영역의 너비를 인식하게 합니다.
        */
        .image-container {
            position: relative;
            width: 90%; /* 브라우저 창 너비의 90%를 차지하도록 유동성 부여 */
            max-width: 1000px; /* 창을 무한정 키웠을 때 너무 거대해지는 것을 방지 */
            margin-bottom: 30px;
            container-type: inline-size; 
        }

        /* 수정된 부분 2: image
           이미지가 컨테이너 너비에 맞춰 빈틈없이 100% 채워지도록 설정합니다.
        */
        .image-container img {
            display: block;
            width: 100%;
            height: auto;
        }

        #number-display {
            position: absolute;
            top: 50%;
            left: 54%; 
            transform: translate(-50%, -50%);
            
            /* 수정된 부분 3: 반응형 폰트 크기
               rem 단위 대신 cqw 단위를 사용하여 이미지 너비와 완벽하게 비례해 줄어듭니다.
               만약 숫자가 "번" 글자보다 조금 크거나 작다면 아래 13cqw의 숫자를 미세 조정하세요. (예: 11cqw, 15cqw)
            */
            font-size: 8vw; /* 구버전 브라우저를 위한 대비책(Fallback) */
            font-size: 13cqw; 
            
            font-weight: bold;
            color: black;
            text-align: center;
            z-index: 10;
            white-space: nowrap; /* 숫자가 길어져도 줄바꿈되지 않도록 강제 */
        }

        #circle-effect {
            position: absolute;
            top: 50%;
            left: 54%;
            transform: translate(-50%, -50%);
            border: 3px solid black;
            border-radius: 50%;
            background-color: transparent;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        .animating {
            animation: shrinkCircle 2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        /* 수정된 부분 4: 애니메이션 크기
           원 애니메이션이 쪼그라들 때 시작되는 원의 크기 역시 브라우저 창 크기에 비례하도록 수정했습니다.
        */
        @keyframes shrinkCircle {
            0% {
                width: 200vw;
                height: 200vw;
                opacity: 1;
            }
            100% {
                width: 0px;
                height: 0px;
                opacity: 0;
            }
        }

        #lucky-btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: #333333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }

        #lucky-btn:hover {
            background-color: #000000;
        }

        #lucky-btn:disabled {
            background-color: #999999;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="luckydraw_image.png" alt="배경 이미지">
        <div id="number-display"></div>
        <div id="circle-effect"></div>
    </div>

    <button id="lucky-btn">Get Lucky!</button>

    <script>
        const button = document.getElementById('lucky-btn');
        const numberDisplay = document.getElementById('number-display');
        const circle = document.getElementById('circle-effect');
        let isAnimating = false;

        button.addEventListener('click', () => {
            if (isAnimating) return;
            isAnimating = true;
            button.disabled = true;

            numberDisplay.textContent = '';

            circle.classList.remove('animating');
            void circle.offsetWidth; 
            circle.classList.add('animating');

            setTimeout(() => {
                const randomNumber = Math.floor(Math.random() * 50) + 1;
                numberDisplay.textContent = randomNumber;
                
                isAnimating = false;
                button.disabled = false;
            }, 2000); // 2초 오차 없이 대기
        });
    </script>
</body>
</html>
